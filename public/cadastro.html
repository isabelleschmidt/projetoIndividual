<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mirrorball insights. | Cadastro</title>

    <link rel="stylesheet" href="./css/cadastro.css">
    <script src="./js/sessao.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
</head>

<body>

    <!------------------ navbar --------->
    <nav>
        <a href="index.html">
            <img src="./assets/logomirrorball.png" alt="mirrorball insights">
        </a>

        <div class="nav-links">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="eras.html">Eras</a></li>
                <li><a href="testes.html">Testes</a></li>
                <li><a href="login.html">Entrar</a></li>
            </ul>
        </div>
    </nav>

    <!-- ALERTA ERRO -->
    <div class="alerta_erro">
        <div class="card_erro" id="cardErro">
            <span id="mensagem_erro"></span>
        </div>
    </div>

    <!-- ÁREA CADASTRO -->
    <div class="login">

        <div class="card-login">

            <!-- TOPO -->
            <div class="card-topo">

                <div class="card-icone">
                    <svg viewBox="0 0 24 24">
                        <circle cx="12" cy="8" r="4"/>
                        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                    </svg>
                </div>

                <h2>Crie sua conta</h2>
                <p class="subtitulo">
                    Entre para ter acesso completo ao mirrorball insights!
                </p>

            </div>

            <!-- FORMULÁRIO -->
            <div class="formulario">

                <div class="campo">
                    <span>Nome</span>
                    <input id="nome_input" type="text" placeholder="Seu nome">
                </div>

                <div class="campo">
                    <span>E-mail</span>
                    <input id="email_input" type="text" placeholder="seu@email.com">
                </div>

                <div class="campo">
                    <span>Senha</span>
                    <input id="senha_input" type="password" placeholder="••••••••">
                </div>

                <div class="campo">
                    <span>Confirmar senha</span>
                    <input id="confirmacao_senha_input" type="password" placeholder="••••••••">
                </div>

                <button class="botao-entrar" onclick="cadastrar()">
                    Cadastrar
                </button>

            </div>

            <!-- LOADING -->
            <div id="div_aguardar" class="loading-div">
                <img src="./assets/circle-loading.gif" alt="Carregando...">
            </div>

            <div id="div_erros_login"></div>

            <!-- RODAPÉ -->
            <div class="card-rodape">
                Já possui uma conta?
                <a href="login.html">Entrar</a>
            </div>

        </div>

    </div>

    <!-- FOOTER -->
    <div class="footer">
        <div class="container">
            <h4>Feito com amor por uma swiftie ♥ SPTech © 2026 </h4>
            <span class="version">v1.0.0</span>
        </div>
    </div>

</body>
</html>
<script>
  function cadastrar() {
    // aguardar();

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;

    // Verificando se há algum campo em branco
    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == "" 
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Mensagem de erro para todos os campos em branco)";

      finalizarAguardar();
      return false;
    } else {
      setInterval(sumirMensagem, 5000);
    }

    // Verificando se o código de ativação é de alguma empresa cadastrada
    for (let i = 0; i < listaEmpresasCadastradas.length; i++) {
      if (listaEmpresasCadastradas[i].codigo_ativacao == codigoVar) {
        idEmpresaVincular = listaEmpresasCadastradas[i].id
        console.log("Código de ativação válido.");
        break;
      } else {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "(Mensagem de erro para código inválido)";
        finalizarAguardar();
      }
    }

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar,
        idEmpresaVincularServer: idEmpresaVincular
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }

  // Listando empresas cadastradas 
  function listar() {
    fetch("/empresas/listar", {
      method: "GET",
    })
      .then(function (resposta) {
        resposta.json().then((empresas) => {
          empresas.forEach((empresa) => {
            listaEmpresasCadastradas.push(empresa);

            console.log("listaEmpresasCadastradas")
            console.log(listaEmpresasCadastradas[0].codigo_ativacao)
          });
        });
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
</script>
