    <!-- ALERTA DE ERRO -->
    <div class="alerta_erro">
        <div class="card_erro" id="cardErro">
            <span id="mensagem_erro"></span>
        </div>
    </div>
 
    <!---------- login ------------ -->
    <div class="login">
        <div class="card-login">
 
            <div class="card-topo">
                <div class="card-icone">
                    <svg viewBox="0 0 24 24">
                        <circle cx="12" cy="8" r="4"/>
                        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>

                <h2>Olá de volta!</h2>
                <p class="subtitulo">Acesse sua conta para ter acesso completo ao mirrorball insights!</p>

                <div class="campo">
                    <span>E-mail</span>
                    <input id="email_input" type="text" placeholder="seu@email.com">

                <div class="campo">
                    <span>Senha</span>
                    <input id="senha_input" type="password" placeholder="••••••••">

                <button class="botao-entrar" onclick="entrar()">Entrar</button>
            </div>
            <div id="div_erros_login"></div>

<script>
    
 /*function aguardar() {
    document.getElementById('div_aguardar').style.display = 'flex';
}*/
 
function finalizarAguardar(texto) {
    document.getElementById('div_aguardar').style.display = 'none';
    if (texto) {
        cardErro.style.display = 'block';
        mensagem_erro.innerHTML = texto;
    }
}
 
function sumirMensagem() {
    cardErro.style.display = 'none';
}
 
function entrar() {
    aguardar();
 
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
 
    if (emailVar == "" || senhaVar == "") {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "Preencha todos os campos antes de continuar.";
        finalizarAguardar();
        return false;
    } else {
        setInterval(sumirMensagem, 5000);
    }
 
    fetch("/usuarios/autenticar", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ emailServer: emailVar, senhaServer: senhaVar })
    }).then(function (resposta) {
        if (resposta.ok) {
            resposta.json().then(json => {
                sessionStorage.EMAIL_USUARIO = json.email;
                sessionStorage.NOME_USUARIO  = json.nome;
                sessionStorage.ID_USUARIO    = json.id;
                sessionStorage.AQUARIOS      = JSON.stringify(json.aquarios);
 
                setTimeout(function () {
                    window.location = "./dashboard/cards.html";
                }, 1000);
            });
        } else {
            resposta.text().then(texto => finalizarAguardar(texto));
        }
    }).catch(function (erro) {
        console.log(erro);
    });
 
    return false;
}
 
</script>
