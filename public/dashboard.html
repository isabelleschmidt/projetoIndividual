<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mirrorball insights. | Dashboard</title>
    <link rel="stylesheet" href="./css/dashboards.css">
    <script src="../js/sessao.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="janela">
        <div class="header-left">
            <div class="logo">
                <img src="./assets/logomirrorball.png" alt="mirrorball insights">
            </div>
            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>
            <a href="./testes.html" class="btn-nav">Testes</a>
            <a href="./dashboard.html" class="btn-nav-active">Dashboard</a>
            <a href="./index.html" class="btn-nav">Home</a>
            <div class="btn-logout" onclick="limparSessao()">Sair</div>
        </div>
        <div class="dash">
            <div class="dash-titulo">
                <p class="decoracao"> Seus resultados:</p>
                <h1><em>Dashboard</em></h1>
                <p>Veja como foi seu desempenho nos testes <3R</p>
            </div>
            <div class="cards-resumo" id="cardsResumo"></div>
            <div class="graficos-grid" id="graficosGrid"></div>
        </div>
    </div>
    <script>
        b_usuario.innerHTML = sessionStorage.NOME_USUARIO;

        const COR_ALBUM = {
            'Taylor Swift': '#4a90a4',
            'Fearless':     '#c9a84c',
            'Speak Now':    '#7b4fa6',
            'Red':          '#b5302a',
            '1989':         '#87ceeb',
            'Reputation':   '#555555',
            'Lover':        '#e8a0b4',
            'Folklore':     '#8c8c8c',
            'Evermore':     '#8b5e3c',
            'Midnights':    '#3b4a6b',
            'TTPD':         '#c8c0b0',
        }

        Chart.defaults.color = '#c9a876'
        Chart.defaults.font.family = "'Outfit', sans-serif"
        Chart.defaults.borderColor = 'rgba(180, 126, 59, 0.15)'

        window.onload = function () {
            var fk_usuario = sessionStorage.ID_USUARIO;
            buscarResultados(fk_usuario);
        }

        function buscarResultados(fk_usuario) {
            fetch(`/quiz/resultado/${fk_usuario}`, { cache: 'no-store' }).then(function (response) {
                if (response.ok) {
                    response.json().then(function (resultados) {
                        console.log("Resultados recebidos:", JSON.stringify(resultados));

                        var dadosShake = resultados.find(function (item) { return item.idquiz === 1; });
                        var dadosAlbum = resultados.find(function (item) { return item.idquiz === 2; });

                        if (!dadosShake && !dadosAlbum) {
                            mostrarSemDados();
                            return;
                        }
                        montarCardsResumo(dadosShake, dadosAlbum);
                        montarGraficos(dadosShake, dadosAlbum);
                    });
                } else {
                    console.error('Nenhum dado encontrado ou erro na API');
                    mostrarSemDados();
                }
            }).catch(function (error) {
                console.error('Erro ao buscar resultados:', error.message);
                mostrarSemDados();
            });
        }

        function mostrarSemDados() {
            document.getElementById('cardsResumo').innerHTML = '';
            document.getElementById('graficosGrid').innerHTML = `
                <div class="grafico-box largo">
                    <div class="sem-dados">
                        <span class="icone"></span>
                        <p>Você ainda não fez nenhum quiz. Faça um teste para ver seus resultados aqui!</p>
                        <a href="testes.html">Ir para os Testes</a>
                    </div>
                </div>`;
        }

        function montarCardsResumo(shake, album) {
            var container = document.getElementById('cardsResumo');
            var html = '';

            
            if (shake) {
                var total = 10;
                var pct = Math.round((shake.pontuacao / total) * 100);
                html += cardResumo('Quiz: Quem disse isso...?', shake.pontuacao + '/' + total, pct + '% de acertos');
            }

            if (album) {
                html += cardResumo('Seu Álbum é o:', album.album, 'de acordo com seu quiz de personalidade');
            }

            if (shake) {
                var erros = 10 - shake.pontuacao;
                html += cardResumo('Quantidade de erros:', erros, 'no quiz Taylor vs Shakespeare');
            }

            container.innerHTML = html;
        }

        function cardResumo(label, valor, desc) {
            return `
                <div class="card-resumo">
                    <span class="card-label">${label}</span>
                    <span class="card-valor">${valor}</span>
                    <span class="card-desc">${desc}</span>
                </div>`;
        }

        function montarGraficos(shake, album) {
            var grid = document.getElementById('graficosGrid');
            var html = '';

            if (shake) {
                html += `
                    <div class="grafico-box">
                        <p class="grafico-titulo">Acertos vs Erros</p>
                        <p class="grafico-subtitulo">Resultado geral do quiz</p>
                        <canvas id="graficoPizza" height="220"></canvas>
                    </div>`;
            }

            if (album) {
                html += `
                    <div class="grafico-box">
                        <p class="grafico-titulo">Seu Álbum</p>
                        <p class="grafico-subtitulo">Resultado do quiz de personalidade</p>
                        <canvas id="graficoAlbum" height="220"></canvas>
                    </div>`;
            }

            grid.innerHTML = html;

            requestAnimationFrame(function () {
                if (shake) {
                    renderizarPizza(shake);
                }
                if (album) {
                    renderizarAlbum(album);
                }
            });
        }

        function renderizarPizza(shake) {
            var total = 10;
            var erros = total - shake.pontuacao;

            new Chart(document.getElementById('graficoPizza'), {
                type: 'doughnut',
                data: {
                    labels: ['Acertos', 'Erros'],
                    datasets: [{
                        data: [shake.pontuacao, erros],
                        backgroundColor: ['#9dd3ba', '#f0c1c6'],
                        borderColor: ['#198754', '#dc3545'],
                        borderWidth: 2,
                        hoverOffset: 8
                    }]
                },
                options: {
                    cutout: '65%',
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { padding: 16, usePointStyle: true }
                        }
                    }
                }
            });
        }

        function renderizarAlbum(album) {
            var cor = COR_ALBUM[album.album] || '#d4af37';

            new Chart(document.getElementById('graficoAlbum'), {
                type: 'doughnut',
                data: {
                    labels: [album.album, 'Outros'],
                    datasets: [{
                        data: [1, 0],
                        backgroundColor: [cor + 'cc', 'transparent'],
                        borderColor: [cor, 'transparent'],
                        borderWidth: 2,
                        hoverOffset: 8
                    }]
                },
                options: {
                    cutout: '65%',
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { padding: 16, usePointStyle: true }
                        }
                    }
                }
            });
        }
    </script>
</body>

</html>
